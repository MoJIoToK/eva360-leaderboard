<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="refresh" content="60">
    <title>🏆 Рейтинг участников EVA360</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 Таблица рейтинга участников</h1>
            <p class="subtitle">EVA360 — сообщество проектировщиков</p>
            <div class="last-update">
                Обновлено: <span id="update-time">—</span>
            </div>
        </header>

        <main>
            <table id="leaderboard-table">
                <thead>
                    <tr>
                        <th>Место</th>
                        <th>Пользователь</th>
                        <th>Рейтинг</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr>
                        <td colspan="3" class="loading">Загрузка...</td>
                    </tr>
                </tbody>
            </table>
        </main>

        <footer>
            <p>© 2026 EVA360. Все права защищены.</p>
        </footer>
    </div>

    <script>
        async function loadLeaderboard() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                renderLeaderboard(data);
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('leaderboard-body').innerHTML = `
                    <tr>
                        <td colspan="3" style="text-align: center; padding: 40px; color: #dc3545;">
                            ❌ Не удалось загрузить таблицу рейтинга
                        </td>
                    </tr>
                `;
            }
        }

        function renderLeaderboard(data) {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            if (!data || data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="3" style="text-align: center; padding: 40px;">
                            Рейтинг пока пуст
                        </td>
                    </tr>
                `;
                return;
            }

            data.forEach((item, index) => {
                const row = document.createElement('tr');
                
                let medal = '';
                if (index === 0) medal = '🥇';
                else if (index === 1) medal = '🥈';
                else if (index === 2) medal = '🥉';

                const username = item.username ? `@${item.username}` : `user${item.user_id}`;
                
                row.innerHTML = `
                    <td><span class="medal">${medal}</span>${index + 1}</td>
                    <td>${username}</td>
                    <td class="rating">${item.rating}</td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('update-time').textContent = new Date().toLocaleString('ru-RU');
        }

        loadLeaderboard();
        setInterval(loadLeaderboard, 30000);
    </script>
</body>
</html>
