<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Рейтинг участников EVA360</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 Таблица рейтинга участников</h1>
            <p class="subtitle">EVA360 — сообщество проектировщиков</p>
            <div class="last-update">
                Обновлено: <span id="update-time">—</span>
            </div>
        </header>

        <main>
            <table id="leaderboard-table">
                <thead>
                    <tr>
                        <th>Место</th>
                        <th>Пользователь</th>
                        <th>Рейтинг</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <!-- Данные будут вставлены через JavaScript -->
                </tbody>
            </table>

            <div id="loading" class="loading">Загрузка...</div>
            <div id="error" class="error" style="display:none;">
                ❌ Не удалось загрузить таблицу рейтинга
            </div>
        </main>

        <footer>
            <p>© 2026 EVA360. Все права защищены.</p>
        </footer>
    </div>

    <script>
        const API_URL = 'https://api.github.com/repos/MoJIoToK/eva360-leaderboard/contents/index.html';

        async function loadLeaderboard() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const content = atob(data.content);
                const leaderboard = JSON.parse(content);

                renderLeaderboard(leaderboard);
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            }
        }

        function renderLeaderboard(data) {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">Рейтинг пока пуст</td></tr>';
                document.getElementById('loading').style.display = 'none';
                return;
            }

            data.forEach((item, index) => {
                const row = document.createElement('tr');
                
                // Медали для топ-3
                let medal = '';
                if (index === 0) medal = '🥇';
                else if (index === 1) medal = '🥈';
                else if (index === 2) medal = '🥉';

                row.innerHTML = `
                    <td>${medal} ${index + 1}</td>
                    <td>${item.username || 'user' + item.user_id}</td>
                    <td class="rating">${item.rating}</td>
                `;
                tbody.appendChild(row);
            });

            // Обновляем время
            document.getElementById('update-time').textContent = new Date().toLocaleString('ru-RU');
            document.getElementById('loading').style.display = 'none';
        }

        // Загружаем данные при старте
        loadLeaderboard();
    </script>
</body>
</html>
